<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
    <!-- TopAppBar -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-[#fbf8ff]/80 dark:bg-[#1a1c1e]/80 backdrop-blur-lg">
        <nav class="flex justify-between items-center w-full px-8 py-3 max-w-7xl mx-auto">

                    class="text-xl font-extrabold text-[#3F51B5] dark:text-[#b0c6ff] font-['Manrope'] tracking-tight">LinkHub</span>
            </div>
            <div class="flex items-center gap-6">
                <a class="text-slate-500 dark:text-slate-400 text-sm font-medium hover:opacity-70 transition-all duration-300 font-['Manrope'] tracking-tight"
                    href="#">Help</a>
            </div>
        </nav>
    </header>
    <!-- Main Content: Login Journey -->

        <!-- Asymmetric Background Decorative Elements -->
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-3xl"></div>
        <div class="w-full max-w-[400px] z-10">
            <!-- Editorial Header -->
            <div class="text-center mb-6">
                <h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-1">Welcome Back</h1>
                <p class="font-body text-xs text-on-surface-variant">The stage is set for your next curation.</p>
            </div>
            <!-- Login Card -->
            <div
                class="bg-surface-container-lowest p-6 md:p-8 rounded-[2rem] shadow-[0px_24px_48px_-12px_rgba(31,51,170,0.06)] border border-outline-variant/10">
                <form class="space-y-4">
                    <!-- Input Email -->
                    <div class="space-y-1.5">
                        <label
                            class="block font-label text-[10px] font-semibold uppercase tracking-widest text-on-surface-variant ml-1"
                            for="email">Email Address</label>
                        <div class="relative group">
                            <input
                                class="w-full px-4 py-3 bg-surface-container-highest border-none rounded-xl font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface transition-all duration-300 placeholder:text-outline/50"
                                id="email" name="email" placeholder="curator@linkhub.com" type="email" />
                        </div>
                    </div>
                    <!-- Input Password -->
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center px-1">
                            <label
                                class="block font-label text-[10px] font-semibold uppercase tracking-widest text-on-surface-variant"
                                for="password">Password</label>
                            <a class="text-[10px] font-semibold text-on-primary-fixed-variant hover:underline"
                                href="#">Forgot?</a>
                        </div>
                        <div class="relative group">
                            <input
                                class="w-full px-4 py-3 bg-surface-container-highest border-none rounded-xl font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface transition-all duration-300 placeholder:text-outline/50"
                                id="password" name="password" placeholder="••••••••" type="password" />
                        </div>
                    </div>
                    <!-- Primary Action -->
                    <button
                        class="w-full py-3.5 bg-editorial-gradient text-white font-headline text-sm font-bold rounded-full hover:shadow-lg hover:shadow-primary/20 active:scale-[0.97] transition-all duration-300 mt-2"
                        type="submit">
                        Sign In to LinkHub
                    </button>
                </form>
                <!-- Divider -->
                <div class="relative my-6 text-center">
                    <span
                        class="bg-surface-container-lowest px-4 text-[10px] font-semibold uppercase tracking-widest text-outline/60 relative z-10">or
                        continue with</span>
                    <div class="absolute top-1/2 left-0 w-full h-[1px] bg-outline-variant/20 -translate-y-1/2"></div>
                </div>
                <!-- Social Logins -->
                <div class="grid grid-cols-2 gap-3">
                    <button
                        class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-high rounded-xl hover:bg-surface-container-highest active:scale-[0.97] transition-all duration-300 group">
                        <img alt="" class="w-4 h-4"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaqDTci7JWWwRcxklan86rx2FiMF6bDQ9MyCC7r9z-CWrtZDLPDyNZbcfJUKDWF06ds-Z5eK_hwmuUr-qt1e8ozh0CpS33Yzdtwy5Bj8cxS0oJo9M9eFjCWGpZyLLgwES1oLv6Z3cdHke_u-jW-oluuEQNSrra_DdzOuXG7G63J7OpaKLHFHC4TTgccC02L0bPtRDHlos68Rjq1AU3JL2_Lao5_pqv22GXQZSgp_WEXapCiUSWqVu8xc3SqnozWoqOLNOK6C1Duo6B" />
                        <span class="font-headline font-semibold text-xs text-on-surface">Google</span>
                    </button>
                    <button
                        class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-high rounded-xl hover:bg-surface-container-highest active:scale-[0.97] transition-all duration-300 group">
                        <img alt="" class="w-4 h-4"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4bBgOMabyzo2odYRQRVOq75bYU5AJdEf1nT0smNt27MhZ7Xmy8L-YXPkM8w6npyVHub3B331bbg-w9kvjt7Ff3j6U8WEkqOAZy2va06LGP0vgqio5yC07DYJXD2vrzOziFBb6DpYTYkZTRnwmAOJuJRWf4p2engmyltCkhkfy55R0gLn5AaUwxm0IvTpSzPZz8Wl1WkyvKOTz4xl0bYlPn7AMfPWamrwcwnhCkzrz-cgacYXzq0lI2pK0vw4PgzA1ctkRij-znczX" />

                    </button>
                </div>
                <!-- Secondary Action -->
                <div class="mt-6 text-center">
                    <p class="font-body text-xs text-on-surface-variant">
                        New to the curator's stage?
                        <a class="font-bold text-on-primary-fixed-variant hover:underline underline-offset-4 ml-1"
                            href="#">Create an account</a>
                    </p>
                </div>
            </div>
            <!-- Social Proof -->
            <div class="mt-6 flex items-center justify-center gap-4">
                <div class="flex -space-x-2">
                    <img alt="" class="w-6 h-6 rounded-full border-2 border-surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1LxZvovqAwMxxa_09Lqdg5bt3Vcwpe4sUAZ4z0duqUFpj6y9z1IFo_3Rfn8WeyilSPK-jrMYmiWkzAr8HdHhHsZz_xcML829T0i8fSOhsj_iY9uim5F64oDEVxFipnp8Yi2rRWlquI4MrzGQFqc4xVWYp9zJR5N46NN00I5-NyKcgrdA9-QVts-qyPXkPHFzidhgQaoMH72Xd8R5UNWtH7JqTuYD-Gn5oYj3qG7h_uINanhSY9q6LyCcVfNqbkj99Ui624Vcs7nQQ" />
                    <img alt="" class="w-6 h-6 rounded-full border-2 border-surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0EdArFDkrK6mP3HOul-dRxX24SkjDH57eOsioXU1FoBCSk2EwclNSsW7EDpBm7kGWI_3rZ7SIEv62-fmnjqzzZqAHWiXO9CWgMliRJU-frHftg2ZVEqkGUVUemYWTKge57bKTPS9nSYzgYkS1fakob2XPeV3iSIEN-7OLW4ZtaT-TL5Ov5BZGFA2irDFX4Sk5rxHm7orBhiXFzhW7BbRXmPPkok3G5KxXd_cd4veuT-EWFCDjLPsJ9TZTKukDKOypdUwzji5b59M1" />
                </div>
                <p class="text-[9px] font-label font-bold uppercase tracking-[0.2em] text-outline/60">Joined by 10k+ Creators</p>
            </div>
        </div>

    <!-- Footer -->
    <footer
        class="bg-transparent py-6 flex flex-col md:flex-row justify-center items-center gap-6 w-full border-t border-[#3F51B5]/10 mt-auto">
        <div class="text-[10px] font-['Inter'] uppercase tracking-widest text-slate-400 dark:text-slate-500">

        <div class="flex gap-6">
